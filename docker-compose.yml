version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: zeta_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-zeta_telemetry}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d zeta_telemetry"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: zeta_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: zeta_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "8889:8889"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:latest
    container_name: zeta_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:latest
    container_name: zeta_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - postgres

  example-app:
    build:
      context: .
      dockerfile: example_app/Dockerfile
    container_name: zeta_example_app
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=example_app
    ports:
      - "8001:8001"
    depends_on:
      - otel-collector

  eval-worker:
    build:
      context: .
      dockerfile: eval_worker/Dockerfile
    container_name: zeta_eval_worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-zeta_telemetry}
      - JAEGER_API_URL=http://jaeger:16686/api/traces
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EVAL_SAMPLE_RATE=${EVAL_SAMPLE_RATE:-0.05}
      - EVAL_POLL_INTERVAL_SECONDS=${EVAL_POLL_INTERVAL_SECONDS:-15}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

volumes:
  pgdata:
  promdata:
  grafanadata: