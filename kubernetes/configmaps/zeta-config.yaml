  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "zeta_telemetry"
  EVAL_SAMPLE_RATE: "0.05"
  EVAL_POLL_INTERVAL_SECONDS: "15"